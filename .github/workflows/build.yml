name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install .NET Framework 4.0 Reference Assemblies
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.microsoft.com/download/9/5/A/95A9616B-7A37-4AF6-BC36-D6EA96C8DAAE/dotNetFx40_Full_x86_x64.exe" -OutFile "dotNetFx40.exe"
          Start-Process -FilePath "dotNetFx40.exe" -ArgumentList "/q /norestart" -Wait

      - name: Restore NuGet Packages
        run: nuget restore ${{ github.workspace }}/KaiosMarketDownloader.sln

      - name: Build
        run: msbuild ${{ github.workspace }}/KaiosMarketDownloader.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KaiosMarketDownloader
          path: |
            ${{ github.workspace }}/KaiosMarketDownloader/bin/Release/*.exe
            ${{ github.workspace }}/KaiosMarketDownloader/bin/Release/*.dll
          retention-days: 30
