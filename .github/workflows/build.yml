name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      
    - name: Restore NuGet packages
      run: nuget restore KaiosMarketDownloader.csproj -PackagesDirectory packages -NonInteractive
      
    - name: Build Release
      run: |
        msbuild KaiosMarketDownloader.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /t:Build /v:minimal /p:RestorePackages=false
      
    - name: Build Debug
      run: |
        msbuild KaiosMarketDownloader.csproj /p:Configuration=Debug /p:Platform=AnyCPU /p:OutputPath=bin\Debug\ /t:Build /v:minimal /p:RestorePackages=false
      
    - name: Copy DLLs to Release output
      run: |
        if not exist "bin\Release" mkdir "bin\Release"
        copy /Y "dlls\*.dll" "bin\Release\"
      
    - name: Copy DLLs to Debug output
      run: |
        if not exist "bin\Debug" mkdir "bin\Debug"
        copy /Y "dlls\*.dll" "bin\Debug\"
      
    - name: Upload Release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KaiosMarketDownloader-Release
        path: |
          bin/Release/*
          !bin/Release/*.pdb
        retention-days: 30
      
    - name: Upload Debug artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KaiosMarketDownloader-Debug
        path: |
          bin/Debug/*
        retention-days: 30

