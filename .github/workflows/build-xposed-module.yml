name: Build Xposed Module

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Gradle Wrapper
      run: |
        cd "Xposed模块获取QToken信息"
        if [ ! -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Creating Gradle wrapper..."
          mkdir -p gradle/wrapper
          # 下载gradle-wrapper.jar (Gradle 7.5支持Java 17)
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar || {
            echo "Failed to download wrapper jar, trying alternative method..."
            # 如果下载失败，尝试使用系统gradle
            if command -v gradle &> /dev/null; then
              gradle wrapper --gradle-version 7.5
            else
              echo "Error: Cannot create gradle wrapper"
              exit 1
            fi
          }
        fi
        chmod +x ./gradlew
      
    - name: Build with Gradle
      run: |
        cd "Xposed模块获取QToken信息"
        ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        
    - name: Check APK exists
      run: |
        APK_PATH="Xposed模块获取QToken信息/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK构建成功"
          ls -lh "$APK_PATH"
        else
          echo "❌ APK文件不存在，查找所有APK文件..."
          find "Xposed模块获取QToken信息" -name "*.apk" -type f || true
          echo "检查构建输出目录..."
          ls -la "Xposed模块获取QToken信息/app/build/outputs/" || true
          exit 1
        fi
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtokenhook-module-apk
        path: Xposed模块获取QToken信息/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: Xposed模块获取QToken信息/app/build/outputs/apk/debug/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
